# Install dependencies with uv and run the (non-slow) test suite with
# coverage on every push / PR to master.
# For more information see:
# https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Run tests

on:
  push:
    branches: [master]
    paths-ignore: ['docs/**', '**.md', '**.rst']
  pull_request:
    branches: [master]
    paths-ignore: ['docs/**', '**.md', '**.rst']
  workflow_dispatch:

permissions:
  contents: read

env:
  # persist numba's on-disk JIT cache between runs so we don't pay the cold
  # compile cost on every CI run (see state_space_numba.py, cache=True)
  NUMBA_CACHE_DIR: ${{ github.workspace }}/.numba_cache

jobs:
  test:
    name: run tests on ubuntu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Cache numba JIT
        uses: actions/cache@v4
        with:
          path: ${{ env.NUMBA_CACHE_DIR }}
          key: numba-${{ runner.os }}-${{ hashFiles('phasegen/state_space_numba.py') }}
      - name: Install phasegen + test deps
        # msprime brings tskit; both ship manylinux wheels, so no conda is
        # needed. The suite runs single-process (numba recompiles per xdist
        # worker), so pytest-xdist is intentionally omitted.
        run: uv pip install --system -e . pytest pytest-cov msprime
      - name: Run tests
        run: pytest --cov phasegen --cov-report=xml testing/ -m "not slow" -x
      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
